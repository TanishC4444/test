name: Newsbrief

on:
  schedule:
    - cron: '0 */6 * * *'   # restart every 6 hours as fallback
  workflow_dispatch:

concurrency:
  group: newsbrief
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 355     # just under GitHub's 6-hour max

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v2

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-distilbart-cnn-6-6-v1

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-v1

      - name: Install dependencies
        run: |
          pip install feedparser playwright transformers==4.44.2 sentencepiece
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          playwright install chromium --with-deps

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Newsbrief loop
        run: python newsbrief.py --all --loop --hours 5.75