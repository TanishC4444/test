name: Newsbrief

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub's minimum)
  workflow_dispatch:          # manual trigger from Actions tab

concurrency:
  group: newsbrief
  cancel-in-progress: false  # queue runs, never kill mid-scrape

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 55       # just under 60min GitHub limit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v2

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-distilbart-cnn-6-6-v1

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-v1

      - name: Install dependencies
        run: |
          pip install feedparser playwright transformers sentencepiece
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          playwright install chromium --with-deps

      - name: Run Newsbrief
        run: python newsbrief.py --all

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add store.json data/
          git diff --staged --quiet || git commit -m "data: $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push